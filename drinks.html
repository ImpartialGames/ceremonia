<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drinks Menu — Ceremonia Rooftop Ubud</title>
<meta name="description" content="Drinks menu — Ceremonia Rooftop Ubud. Specialty coffees, signature lattes, ceremonial boosters, teas, smoothies and crafted cocktails poured with 60 ml of alcohol.">
<meta name="theme-color" content="#0F1B35">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F1B35;--navy-lt:#141F3A;--cream:#EDE8DF;--gold:#D4B896;--ivory:#F5F0E8;--umber:#8B6F47;--ease:cubic-bezier(0.16,1,0.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--navy);overflow-x:clip;font-family:'Inter',sans-serif;color:var(--ivory)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold)}
a{text-decoration:none;color:inherit}
.grain::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.05}
#bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:16px 6vw;background:rgba(15,27,53,.82);backdrop-filter:blur(18px) saturate(150%);border-bottom:1px solid rgba(212,184,150,.12)}
#bar .brand{display:flex;align-items:center;gap:10px}
#bar img{width:30px;height:30px;object-fit:contain}
#bar .brand span{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--ivory)}
.back{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,240,232,.6);transition:color .25s}
.back:hover{color:var(--gold)}
#cover{position:relative;text-align:center;padding:160px 7vw 64px;overflow:hidden;background:radial-gradient(ellipse at 50% 30%,rgba(139,94,60,.14) 0%,transparent 62%)}
#cover .eyebrow{font-size:10px;letter-spacing:.55em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
#cover h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(48px,9vw,104px);line-height:.92;letter-spacing:-.01em}
#cover h1 em{display:block;color:var(--gold);font-weight:400;font-style:italic}
#cover .tag{max-width:560px;margin:28px auto 0;font-weight:300;font-size:13px;line-height:1.9;color:rgba(245,240,232,.55)}
.legend{margin-top:18px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(212,184,150,.6)}
.cover-orn{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:30px}
.cover-orn .l{width:60px;height:1px;background:rgba(212,184,150,.3)}
.cover-orn span{color:rgba(212,184,150,.6);font-size:13px}
.group{position:relative;padding:66px 7vw}
.group.navy{background:var(--navy)}.group.lt{background:var(--navy-lt)}
.group-head{text-align:center;margin-bottom:12px}
.group-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,5vw,56px);color:var(--ivory)}
.group-note{text-align:center;font-size:12px;font-weight:300;color:rgba(245,240,232,.45);margin-bottom:38px;letter-spacing:.02em}
.inner{max-width:980px;margin:0 auto;position:relative;z-index:1}
.sec{margin-bottom:42px}
.sec-label{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.sec-label span{font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.sec-label .l{flex:1;height:1px;background:rgba(212,184,150,.12)}
.sec-note{font-size:11px;font-weight:300;font-style:italic;color:rgba(245,240,232,.42);margin:0 0 18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:linear-gradient(135deg,rgba(15,27,53,.7),rgba(22,33,60,.85));border:1px solid rgba(212,184,150,.12);border-radius:13px;backdrop-filter:blur(8px);
  box-shadow:0 6px 22px rgba(0,0,0,.28),inset 0 1px 0 rgba(212,184,150,.05);padding:16px 18px;transition:border-color .3s,box-shadow .3s,transform .3s var(--ease)}
.card:hover{border-color:rgba(212,184,150,.3);box-shadow:0 12px 30px rgba(0,0,0,.4);transform:translateY(-3px)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.card .name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:20px;color:var(--ivory)}
.card .price{font-size:12px;letter-spacing:.06em;color:var(--gold);font-weight:500;white-space:nowrap}
.card .desc{font-weight:300;font-size:12px;line-height:1.6;color:rgba(245,240,232,.42);margin-top:6px}
.badge{display:inline-block;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--navy);background:var(--gold);border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle;font-weight:600}
.veg{color:rgba(212,184,150,.7);font-size:10px;margin-left:6px;font-style:italic}
footer{text-align:center;padding:48px 7vw 60px;background:var(--navy);position:relative}
footer .note{font-size:11px;font-weight:300;color:rgba(245,240,232,.4);line-height:1.8;max-width:540px;margin:0 auto 26px}
footer .logo{width:84px;margin:0 auto 14px}
footer .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);font-size:18px}
footer .home{display:inline-block;margin-top:26px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);padding:12px 28px;transition:background .3s,color .3s}
footer .home:hover{background:var(--gold);color:var(--navy)}
[data-rev]{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
[data-rev].in{opacity:1;transform:none}
@media(max-width:760px){.grid{grid-template-columns:1fr}#cover{padding:130px 7vw 50px}.group{padding:54px 7vw}.card .name{font-size:19px}}
</style>
</head>
<body>
<nav id="bar">
  <a class="brand" href="index.html"><img src="logo-ceremonia-beige.webp" alt="Ceremonia"><span>Ceremonia</span></a>
  <a class="back" href="index.html">← Home</a>
</nav>
<header id="cover" class="grain">
  <p class="eyebrow">The Bar</p>
  <h1>Drinks<em>Menu</em></h1>
  <p class="tag">Specialty coffees, ceremonial boosters &amp; crafted cocktails — every Ceremonia cocktail is poured with 60 ml of alcohol, when the Ubud standard is just 45 ml.</p>
  <div class="cover-orn"><span class="l"></span><span>✦</span><span class="l"></span></div>
</header>
<main id="menu"></main>
<footer class="grain">
  <p class="note" id="legal"></p>
  <img class="logo" src="logo-ceremonia-beige.webp" alt="Ceremonia">
  <p class="tagline">Under the Ubud Sky</p>
  <a class="home" href="index.html">Back to Ceremonia</a>
</footer>
<script>
const NOTE="Please inform us if you have any allergies. All rates are in thousands (’000) IDR, subject to 11% government tax & 5% service.";
const MENU=[
 {group:"Coffee & More", cls:"navy", sections:[
   {label:"Classic Coffees", note:"Cow milk can be replaced with oat milk +10 · Iced +5", items:[
     {name:"Espresso / Double Espresso", price:"30/40"},
     {name:"Café Latte", price:"37"},
     {name:"Flat White", price:"37"},
     {name:"Americano", price:"35"},
     {name:"Cold Brew Americano", price:"45"},
     {name:"Cappuccino / Double", price:"39/49"},
     {name:"Mochaccino", price:"35"},
     {name:"Kopi Bali", price:"30"},
   ]},
   {label:"Signature Lattes", note:"Regular milk can be replaced with oat milk +10", items:[
     {name:"Speculoos Ice Latte", price:"65", desc:"Espresso, speculoos, vanilla syrup, milk"},
     {name:"Caramel Latte", price:"50", desc:"Espresso, speculoos, caramel syrup, milk"},
     {name:"Matcha Green Latte", price:"55", desc:"Matcha, milk, sugar"},
   ]},
   {label:"Ceremonial Boosters", items:[
     {name:"Secret Ginger Booster", veg:"spicy", price:"75", desc:"Hand-grated ginger, lime, honey-infused tea & other secret spices"},
     {name:"Golden Shooter", price:"50", desc:"Fresh blend of turmeric, lime & honey"},
   ]},
   {label:"Teas & Infusions", items:[
     {name:"Bali Ice Tea", price:"35", desc:"Iced black tea"},
     {name:"Rosella Ice Tea", price:"40"},
     {name:"Black Hot Tea Pot", price:"40"},
     {name:"Jasmine & Green Tea Pot", price:"40"},
     {name:"Fresh Infusion — Choose 2", price:"40", desc:"Ginger / mint / lemon / lemongrass / rosella / orange"},
   ]},
   {label:"Smoothies & Energy", note:"Fresh blended for Bali mornings", items:[
     {name:"Ceremonia Mix Berry", tag:"Best seller", price:"75", desc:"Strawberry, blueberry, yogurt, milk, honey"},
     {name:"Gary’s Smoothie", price:"65", desc:"Dates, pineapple, banana, milk, honey"},
     {name:"Strawberry Smoothie", price:"85", desc:"Fresh strawberry, yogurt, milk, honey, strawberry syrup"},
     {name:"Choco Banana Smoothie", price:"85", desc:"Chocolate, banana, milk, honey"},
     {name:"Morning Coffee Smoothie", price:"70", desc:"Banana, espresso, oat milk, oat seeds"},
   ]},
 ]},
 {group:"Ceremonia Cocktails", cls:"lt", note:"Crafted with 60 ml of alcohol — when the Ubud standard is just 45 ml", sections:[
   {label:"Signature Pours", items:[
     {name:"Mojito Original", tag:"Best seller", price:"115", desc:"White rhum, soda water, mint leaf, sugar, fresh lime"},
     {name:"Strawberry Mojito", price:"125", desc:"White rhum, fresh strawberry, mint leaf, strawberry syrup, soda water"},
     {name:"Basil Gin Tonic", price:"120", desc:"Dry gin, basil leaves, Schweppes tonic, lime juice & pepper"},
     {name:"Aperol Spritz", tag:"Best seller", price:"135", desc:"Orange aperitif, sparkling wine, soda — wine glass with ice & orange slices"},
     {name:"Piña Colada", price:"120", desc:"White rhum, coconut cream, pineapple juice, simple syrup"},
     {name:"Margarita", price:"110", desc:"Tequila, triple sec, lime juice & a salted rim"},
     {name:"Banana Daïquiri", price:"115", desc:"White rhum, banana nectar, green lime juice, brown sugar"},
     {name:"Espresso Martini", price:"110", desc:"Vodka, coffee liquor, simple syrup, fresh espresso topped with beans"},
     {name:"Baligroni", price:"145", desc:"Dry gin, red vermouth, Campari, topped with a zest of orange — 90 ml pure alcohol"},
     {name:"Long Island", price:"130", desc:"Gin, vodka, tequila, rhum, triple sec, lime juice, topped with cola — 75 ml pure alcohol"},
   ]},
 ]},
 {group:"Ceremonia Signature", cls:"navy", note:"Crafted with 60 ml of alcohol — when the Ubud standard is just 45 ml", sections:[
   {label:"House Creations", items:[
     {name:"Passion Fruit Swizzle", price:"130", desc:"White rhum, passion fruit syrup, fresh passion fruit, lime juice, soda"},
     {name:"Passion Gin Tonic", price:"135", desc:"Dry gin, passion fruit, Schweppes tonic, lime juice"},
     {name:"Coconut Sunset", price:"120", desc:"White rhum, pineapple & orange juice, coconut cream, strawberry syrup"},
     {name:"Ceremonia Blue", price:"125", desc:"Gin, blue curaçao, ginger extract, lime juice, topped with ginger ale"},
     {name:"Kaffir Garden", veg:"no added sugar", price:"125", desc:"White rhum, blue curaçao, pineapple, orange, kaffir essence"},
     {name:"Mystic Violet", price:"125", desc:"Gin, triple sec, lime juice, simple syrup, purple butterfly pea flower"},
     {name:"Love Spirit", price:"115", desc:"Vodka, elderflower liquor, pomegranate, kaffir, lime juice, simple syrup, soda"},
     {name:"Elixir of Madeleine", price:"125", desc:"Almond liquor, triple sec, pineapple & lime juice, coconut cream"},
     {name:"Peach Nectar", price:"120", desc:"Peach liquor, mango juice, simple syrup, lime juice, soda water, basil"},
     {name:"Gin Daisy", price:"120", desc:"Gin, triple sec, grenadine, lime juice, topped with tonic"},
   ]},
 ]},
];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function itemCard(it){
  return `<div class="card">
    <div class="top">
      <span class="name">${esc(it.name)}${it.veg?`<span class="veg">(${esc(it.veg)})</span>`:''}${it.tag?`<span class="badge">${esc(it.tag)}</span>`:''}</span>
      ${it.price?`<span class="price">${esc(it.price)}<small style="opacity:.6">k</small></span>`:''}
    </div>
    ${it.desc?`<p class="desc">${esc(it.desc)}</p>`:''}
  </div>`;
}
function render(){
  document.getElementById('menu').innerHTML=MENU.map(g=>`
    <section class="group ${g.cls} grain"><div class="inner">
      <div class="group-head"><h2 data-rev>${esc(g.group)}</h2></div>
      ${g.note?`<p class="group-note" data-rev>${esc(g.note)}</p>`:''}
      ${g.sections.map(sec=>`
        <div class="sec">
          <div class="sec-label" data-rev><span>${esc(sec.label)}</span><span class="l"></span></div>
          ${sec.note?`<p class="sec-note" data-rev>${esc(sec.note)}</p>`:''}
          <div class="grid">${sec.items.map(it=>`<span data-rev>${itemCard(it)}</span>`).join('')}</div>
        </div>`).join('')}
    </div></section>`).join('');
  document.getElementById('legal').textContent=NOTE;
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.06,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach((el,i)=>{el.style.transitionDelay=((i%6)*45)+'ms';io.observe(el)});
}
render();
</script>
</body>
</html>
