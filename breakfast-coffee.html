<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Breakfast &amp; Coffee — Ceremonia Rooftop Ubud</title>
<meta name="description" content="Breakfast &amp; Coffee menu — Ceremonia Rooftop Ubud. Homemade smoothie bowls, eggs, pancakes, desserts, signature lattes, fresh juices and more.">
<meta name="theme-color" content="#0F1B35">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F1B35;--navy-lt:#141F3A;--cream:#EDE8DF;--gold:#D4B896;--ivory:#F5F0E8;--umber:#8B6F47;--ease:cubic-bezier(0.16,1,0.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--navy);overflow-x:clip;font-family:'Inter',sans-serif;color:var(--ivory)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold)}
a{text-decoration:none;color:inherit}
.grain::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.05}

/* nav */
#bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:16px 6vw;background:rgba(15,27,53,.82);backdrop-filter:blur(18px) saturate(150%);
  border-bottom:1px solid rgba(212,184,150,.12)}
#bar .brand{display:flex;align-items:center;gap:10px}
#bar img{width:30px;height:30px;object-fit:contain}
#bar .brand span{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--ivory)}
.back{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,240,232,.6);transition:color .25s}
.back:hover{color:var(--gold)}
.bar-right{display:flex;align-items:center;gap:18px}
.lang-switch{display:flex;align-items:center;gap:6px}
.lang-btn{background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.12em;color:rgba(245,240,232,.5);padding:2px;transition:color .25s}
.lang-btn:hover{color:var(--gold)}
.lang-btn.active{color:var(--gold);font-weight:600}
.lang-sep{color:rgba(212,184,150,.3);font-size:10px}

/* cover */
#cover{position:relative;text-align:center;padding:160px 7vw 70px;overflow:hidden;
  background:radial-gradient(ellipse at 50% 30%,rgba(139,94,60,.14) 0%,transparent 62%)}
#cover .eyebrow{font-size:10px;letter-spacing:.55em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
#cover h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(48px,9vw,104px);line-height:.92;letter-spacing:-.01em}
#cover h1 em{display:block;color:var(--gold);font-weight:400;font-style:italic}
#cover .tag{max-width:520px;margin:30px auto 0;font-weight:300;font-size:14px;line-height:1.9;color:rgba(245,240,232,.55)}
.cover-orn{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:34px}
.cover-orn .l{width:60px;height:1px;background:rgba(212,184,150,.3)}
.cover-orn span{color:rgba(212,184,150,.6);font-size:13px}

/* category tabs */
#tabs{position:sticky;top:62px;z-index:90;display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
  padding:16px 6vw;background:rgba(15,27,53,.92);backdrop-filter:blur(14px) saturate(150%);border-bottom:1px solid rgba(212,184,150,.1)}
.tab{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.6);
  background:transparent;border:1px solid rgba(212,184,150,.25);border-radius:30px;padding:9px 18px;cursor:pointer;
  transition:color .3s var(--ease),background .3s var(--ease),border-color .3s var(--ease);white-space:nowrap}
.tab:hover{color:var(--gold);border-color:rgba(212,184,150,.5)}
.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
@media(max-width:760px){#tabs{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch}
  #tabs::-webkit-scrollbar{display:none}}

/* groups */
.group{position:relative;padding:70px 7vw}
.group.navy{background:var(--navy)}
.group.lt{background:var(--navy-lt)}
.group-head{text-align:center;margin-bottom:14px}
.group-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,5vw,56px);color:var(--ivory)}
.group-note{text-align:center;font-size:12px;font-weight:300;color:rgba(245,240,232,.45);margin-bottom:40px;letter-spacing:.02em}
.inner{max-width:980px;margin:0 auto;position:relative;z-index:1}

.sec{margin-bottom:44px}
.sec-label{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sec-label span{font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.sec-label .l{flex:1;height:1px;background:rgba(212,184,150,.12)}
.sec-note{font-size:11px;font-weight:300;font-style:italic;color:rgba(245,240,232,.4);margin:-10px 0 18px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:linear-gradient(135deg,rgba(15,27,53,.7),rgba(22,33,60,.85));
  border:1px solid rgba(212,184,150,.12);border-radius:13px;backdrop-filter:blur(8px);
  box-shadow:0 6px 22px rgba(0,0,0,.28),inset 0 1px 0 rgba(212,184,150,.05);
  padding:16px 18px;transition:border-color .3s,box-shadow .3s,transform .3s var(--ease)}
.card:hover{border-color:rgba(212,184,150,.3);box-shadow:0 12px 30px rgba(0,0,0,.4);transform:translateY(-3px)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.card .name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:20px;color:var(--ivory)}
.card .price{font-size:12px;letter-spacing:.06em;color:var(--gold);font-weight:500;white-space:nowrap}
.card .desc{font-weight:300;font-size:12px;line-height:1.6;color:rgba(245,240,232,.42);margin-top:6px}
.badge{display:inline-block;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--navy);
  background:var(--gold);border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle;font-weight:600}
.veg{color:rgba(120,180,110,.85);font-size:10px;margin-left:6px}

/* extras list */
.extras{display:flex;flex-wrap:wrap;gap:8px 26px;border:1px dashed rgba(212,184,150,.2);border-radius:13px;padding:18px 22px}
.extras li{list-style:none;font-size:12.5px;font-weight:300;color:rgba(245,240,232,.6)}
.extras li b{color:var(--gold);font-weight:500;margin-left:4px}

/* footer */
footer{text-align:center;padding:48px 7vw 60px;background:var(--navy);position:relative}
footer .note{font-size:11px;font-weight:300;color:rgba(245,240,232,.4);line-height:1.8;max-width:540px;margin:0 auto 26px}
footer .logo{width:84px;margin:0 auto 14px}
footer .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);font-size:18px}
footer .home{display:inline-block;margin-top:26px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;
  border:1px solid var(--gold);color:var(--gold);padding:12px 28px;transition:background .3s,color .3s}
footer .home:hover{background:var(--gold);color:var(--navy)}

[data-rev]{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
[data-rev].in{opacity:1;transform:none}

@media(max-width:760px){
  .grid{grid-template-columns:1fr}
  #cover{padding:130px 7vw 56px}
  .group{padding:56px 7vw}
  .card .name{font-size:19px}
}
</style>
</head>
<body>

<nav id="bar">
  <a class="brand" href="index.html">
    <img src="logo-ceremonia-beige.webp" alt="Ceremonia">
    <span>Ceremonia</span>
  </a>
  <div class="bar-right">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="en">EN</button><span class="lang-sep">·</span><button class="lang-btn" data-lang="fr">FR</button><span class="lang-sep">·</span><button class="lang-btn" data-lang="id">ID</button><span class="lang-sep">·</span><button class="lang-btn" data-lang="es">ES</button>
    </div>

<header id="cover" class="grain">
  <p class="eyebrow" data-t="The Menu">The Menu</p>
  <h1>Breakfast<em>&amp; Coffee</em></h1>

<script src="menu-i18n.js"></script>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function itemCard(it){
  return `<div class="card">
    <div class="top">
      <span class="name">${esc(it.name)}${it.veg?'<span class="veg" title="Vegetarian">(V)</span>':''}${it.tag?`<span class="badge">${esc(t(it.tag))}</span>`:''}</span>
      <span class="price">${esc(it.price)}<small style="opacity:.6">k</small></span>
    </div>
    ${it.desc?`<p class="desc">${esc(t(it.desc))}</p>`:''}
  </div>`;
}
let SECTIONS=[],io,CUR=0;
function render(){
  const m=document.getElementById('menu');
  m.innerHTML=MENU.map((g,gi)=>`
    <section class="group ${g.cls} grain" data-g="${gi}">
      <div class="inner">
        <div class="group-head"><h2 data-rev>${esc(t(g.group))}</h2></div>
        ${g.note?`<p class="group-note" data-rev>${esc(t(g.note))}</p>`:''}
        ${g.sections.map(sec=>`
          <div class="sec">
            <div class="sec-label" data-rev><span>${esc(t(sec.label))}</span><span class="l"></span></div>
            ${sec.note?`<p class="sec-note" data-rev>${esc(t(sec.note))}</p>`:''}
            ${sec.extras
              ? `<ul class="extras" data-rev>${sec.extras.map(e=>`<li>${esc(t(e[0]))}<b>${esc(e[1])}k</b></li>`).join('')}</ul>`
              : `<div class="grid">${sec.items.map(it=>`<span data-rev>${itemCard(it)}</span>`).join('')}</div>`}
          </div>
        `).join('')}
      </div>
    </section>
  `).join('');
  document.getElementById('legal').textContent=t(NOTE);
  document.getElementById('tabs').innerHTML=MENU.map((g,gi)=>`<button class="tab" data-g="${gi}">${esc(t(g.group))}</button>`).join('');
  SECTIONS=[...document.querySelectorAll('.group')];
  io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.06,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('#tabs .tab').forEach(b=>b.addEventListener('click',()=>showGroup(+b.dataset.g,true)));
  showGroup(Math.min(CUR,MENU.length-1),false);
}
function showGroup(idx,scroll){
  CUR=idx;
  document.querySelectorAll('#tabs .tab').forEach((b,i)=>b.classList.toggle('active',i===idx));
  SECTIONS.forEach((s,i)=>{s.hidden=i!==idx});
  SECTIONS[idx].querySelectorAll('[data-rev]').forEach((el,i)=>{el.classList.remove('in');el.style.transitionDelay=((i%6)*45)+'ms';io.observe(el)});
  if(scroll){const y=document.getElementById('menu').offsetTop-110;window.scrollTo({top:Math.max(0,y),behavior:'smooth'})}
}
window.__render=render;
render();
if(window.initI18n)initI18n();
